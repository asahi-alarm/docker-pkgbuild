name: build
on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:
jobs:
  x86_64:
    name: x86_64
    runs-on: ubuntu-24.04
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
      - name: build and publish the x86_64 image
        run: |
          echo "${{ secrets.DOCKER_PAT }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
          docker build --no-cache --platform=linux/amd64 -f Dockerfile.x86_64 -t josdehaes/asahi-alarm-pkgbuild-mesa:latest .
          docker push josdehaes/asahi-alarm-pkgbuild-mesa:latest
  aarch64:
    name: aarch64
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
      - name: build and publish the aarch64 image
        run: |
          echo "${{ secrets.DOCKER_PAT }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
          docker build --no-cache --platform=linux/arm64 -f Dockerfile.aarch64 -t josdehaes/asahi-alarm-pkgbuild:latest .
          docker push josdehaes/asahi-alarm-pkgbuild:latest
  check-rebuild:
    name: check if package rebuilds are needed
    runs-on: ubuntu-24.04-arm
    needs: [aarch64]
    permissions:
      contents: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
      - name: Get dependency versions from fresh image
        id: versions
        run: |
          docker pull josdehaes/asahi-alarm-pkgbuild:latest
          VERSIONS=$(docker run --rm josdehaes/asahi-alarm-pkgbuild:latest pacman -Q llvm-libs python icu 2>/dev/null)
          LLVM=$(echo "$VERSIONS" | awk '/^llvm-libs /{print $2}' | cut -d. -f1)
          PYTHON=$(echo "$VERSIONS" | awk '/^python /{print $2}' | cut -d. -f1,2)
          ICU=$(echo "$VERSIONS" | awk '/^icu /{print $2}' | cut -d. -f1)
          echo "llvm=$LLVM"
          echo "python=$PYTHON"
          echo "icu=$ICU"
          echo "llvm=$LLVM" >> "$GITHUB_OUTPUT"
          echo "python=$PYTHON" >> "$GITHUB_OUTPUT"
          echo "icu=$ICU" >> "$GITHUB_OUTPUT"
      - name: Check for broken shared libraries
        id: ldd-check
        run: |
          # Check if calamares has any broken shared library links (soname bumps)
          # Run as root since the container defaults to unprivileged user
          RESULT=$(docker run --rm --user root josdehaes/asahi-alarm-pkgbuild:latest sh -c '
            if ! pacman --noconfirm -Sy calamares 2>&1; then
              echo "INSTALL_FAILED"
              exit 0
            fi
            ldd /usr/bin/calamares 2>&1 | grep "not found" || echo "ALL_OK"
          ')
          if echo "$RESULT" | grep -q "INSTALL_FAILED"; then
            echo "Calamares package failed to install"
            echo "$RESULT"
            echo "needs_rebuild=true" >> "$GITHUB_OUTPUT"
          elif echo "$RESULT" | grep -q "ALL_OK"; then
            echo "Calamares library links OK"
            echo "needs_rebuild=false" >> "$GITHUB_OUTPUT"
          else
            echo "Calamares has broken library links:"
            echo "$RESULT"
            echo "needs_rebuild=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Compare versions and trigger rebuilds
        env:
          GH_TOKEN: ${{ secrets.PKGBUILDS_TOKEN }}
        run: |
          REBUILD_PACKAGES=""

          # Load previous versions
          PREV_LLVM=""
          if [ -f versions.txt ]; then
            PREV_LLVM=$(grep '^PREV_LLVM=' versions.txt | cut -d= -f2)
          fi

          # Check LLVM -> mesa, virglrenderer
          LLVM_CHANGED=false
          if [ "${{ steps.versions.outputs.llvm }}" != "$PREV_LLVM" ]; then
            echo "LLVM changed: ${PREV_LLVM:-unknown} -> ${{ steps.versions.outputs.llvm }}"
            REBUILD_PACKAGES="mesa virglrenderer"
            LLVM_CHANGED=true
          fi

          # Check calamares for broken shared library links
          if [ "${{ steps.ldd-check.outputs.needs_rebuild }}" = "true" ]; then
            echo "Calamares needs rebuild due to broken library links"
            REBUILD_PACKAGES="$REBUILD_PACKAGES calamares"
          fi

          REBUILD_PACKAGES=$(echo "$REBUILD_PACKAGES" | xargs)

          if [ -n "$REBUILD_PACKAGES" ]; then
            echo "Bumping pkgrel and triggering rebuild for: $REBUILD_PACKAGES"

            # Clone PKGBUILDs, bump pkgrel, push
            git clone --depth 1 https://x-access-token:${GH_TOKEN}@github.com/asahi-alarm/PKGBUILDs.git /tmp/PKGBUILDs
            cd /tmp/PKGBUILDs
            git config user.email "action@github.com"
            git config user.name "GitHub Action"

            for pkg in $REBUILD_PACKAGES; do
              if [ -f "$pkg/PKGBUILD" ]; then
                # Increment pkgrel
                OLD_REL=$(grep '^pkgrel=' "$pkg/PKGBUILD" | cut -d= -f2)
                NEW_REL=$((OLD_REL + 1))
                sed -i "s/^pkgrel=.*/pkgrel=$NEW_REL/" "$pkg/PKGBUILD"
                echo "$pkg: pkgrel $OLD_REL -> $NEW_REL"
                git add "$pkg/PKGBUILD"
              fi
            done

            git commit -m "bump pkgrel for rebuild ($REBUILD_PACKAGES)"
            git push

            # Trigger the build workflow
            gh workflow run build.yml --repo asahi-alarm/PKGBUILDs -f packages="$REBUILD_PACKAGES"

            # Trigger RootFS rebuild if LLVM changed (mesa rebuild)
            if [ "$LLVM_CHANGED" = "true" ]; then
              gh workflow run manual.yml --repo asahi-alarm/RootFS --ref asahi-alarm
            fi
          else
            echo "No version changes detected, no rebuild needed"
          fi

          # Save current versions
          cd "$GITHUB_WORKSPACE"
          printf '%s\n' \
            "PREV_LLVM=${{ steps.versions.outputs.llvm }}" \
            > versions.txt
      - name: Commit updated versions
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add versions.txt
          git diff-index --quiet HEAD || git commit -m "Update tracked dependency versions"
          git pull --rebase
          git push
  workflow-keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@v1
